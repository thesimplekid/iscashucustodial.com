    <style>
        :root {
            --bg: #ffffff;
            --text: #0a0a0a;
            --text-muted: #6B7280;
            --accent: #3B82F6;
            --border: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .yes-link {
            font-size: clamp(4rem, 15vw, 12rem);
            font-weight: 600;
            color: var(--text);
            text-decoration: none;
            transition: opacity 0.2s ease;
        }

        .yes-link:hover {
            opacity: 0.7;
        }

        footer {
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
        }

        .footer-content {
            max-width: 1152px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .footer-section h3 {
            font-size: 0.625rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .footer-section ul {
            list-style: none;
        }

        .footer-section li {
            margin-bottom: 0.125rem;
        }

        .footer-section a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.75rem;
            transition: opacity 0.2s ease;
        }

        .footer-section a:hover {
            opacity: 0.7;
        }

        .footer-bottom {
            max-width: 1152px;
            margin: 1rem auto 0;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .footer-logo {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .footer-logo svg {
            width: 16px;
            height: 16px;
        }

        .footer-logo img {
            height: 14px;
        }

        .footer-tagline {
            font-size: 0.625rem;
            color: var(--text-muted);
        }

        .footer-copyright {
            font-size: 0.625rem;
            color: var(--text-muted);
        }

        .social-links {
            display: flex;
            gap: 0.5rem;
        }

        .social-links a {
            color: var(--text-muted);
            transition: color 0.2s ease;
        }

        .social-links a:hover {
            color: var(--text);
        }

        .social-links svg {
            width: 14px;
            height: 14px;
        }
    </style>
</head>
